<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер дошки — перегляд</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
  --border:#e2e0d8;--text:#1a1916;--text2:#6b6960;--text3:#9e9c94;
  --accent:#2d5a3d;--accent-light:#e8f2eb;
  --danger:#8b2020;--danger-light:#fdf0f0;
  --warn:#7a4a0a;--warn-light:#fdf5e8;
  --blue:#1a3f6b;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.topbar-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:500;flex:1;}
.view-badge{background:var(--blue-light,#eaf0f8);color:var(--blue);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:500;}
.today-date{font-size:12px;color:var(--text3);}
.edit-link{font-size:12px;color:var(--accent);text-decoration:none;padding:5px 12px;border:1px solid var(--accent);border-radius:var(--radius-sm);}
.edit-link:hover{background:var(--accent-light);}

.stats-row{display:flex;gap:10px;flex-wrap:wrap;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
.stat-card{flex:1;min-width:88px;background:var(--surface2);border-radius:var(--radius);padding:10px 14px;border:1px solid var(--border);}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.stat-val{font-size:20px;font-weight:500;font-family:'Unbounded',sans-serif;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}

.class-tabs{display:flex;gap:6px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.class-tab{padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:transparent;font-family:'Geologica',sans-serif;color:var(--text2);transition:all .15s;}
.class-tab:hover{background:var(--surface2);}
.class-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.content{padding:20px 24px;}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);}
table{width:100%;border-collapse:collapse;}
thead{background:var(--surface2);}
th{padding:9px 10px;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#fafaf7;}
.num-cell{width:28px;color:var(--text3);font-size:12px;}
.name-cell{font-weight:400;min-width:130px;}
.name-missing{color:var(--text3);text-decoration:line-through;}

.visit-cell{text-align:center;min-width:52px;}
.visit-pct{display:inline-block;padding:2px 8px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;background:var(--surface2);color:var(--text2);}
.visit-pct.filled{background:#f0faf3;color:#1e5a2a;border:1px solid #b2ddb8;}
.visit-date-sm{font-size:10px;color:var(--text3);display:block;margin-top:1px;}
.empty-visit{color:var(--text3);font-size:12px;}

.avg-cell{text-align:right;color:var(--text2);font-size:13px;}
.grade-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:26px;border-radius:var(--radius-sm);font-family:'Unbounded',sans-serif;font-size:13px;font-weight:500;}
.g-high{background:#eaf5ee;color:#1e5a2a;}
.g-good{background:#eaf0f8;color:#1a3f6b;}
.g-mid{background:#fdf5e8;color:#7a4a0a;}
.g-low{background:#fdf0f0;color:#8b2020;}
.g-none{background:var(--surface2);color:var(--text3);}

.status-pill{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;margin-top:3px;}
.pill-absent{background:var(--warn-light);color:var(--warn);}
.pill-notready{background:var(--danger-light);color:var(--danger);}

.comment-icon{font-size:13px;cursor:default;}

.no-data{text-align:center;padding:3rem;color:var(--text3);}
.no-data-title{font-family:'Unbounded',sans-serif;font-size:15px;margin-bottom:8px;}
.no-data-sub{font-size:13px;}

.refresh-hint{font-size:11px;color:var(--text3);text-align:right;margin-top:10px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Трекер виходів до дошки</div>
  <span class="today-date" id="todayDate"></span>
  <span class="view-badge">Режим перегляду</span>
  <a href="edit.html" class="edit-link">Редагувати →</a>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="stat-label">Учнів</div><div class="stat-val" id="st-total">—</div><div class="stat-sub">у списку</div></div>
  <div class="stat-card"><div class="stat-label">Оцінено</div><div class="stat-val" id="st-graded">—</div><div class="stat-sub">мають оцінку</div></div>
  <div class="stat-card"><div class="stat-label">Сер. оцінка</div><div class="stat-val" id="st-avg">—</div><div class="stat-sub">1–12 шкала</div></div>
  <div class="stat-card"><div class="stat-label">Якість ≥7</div><div class="stat-val" id="st-quality">—</div><div class="stat-sub">достатній рівень</div></div>
  <div class="stat-card"><div class="stat-label">Ще не виходили</div><div class="stat-val" id="st-never">—</div><div class="stat-sub">учнів</div></div>
</div>

<div class="class-tabs" id="classTabs"></div>

<div class="content">
  <div class="legend">
    <div class="legend-item"><div class="ldot" style="background:#7ab98a"></div> Є результат</div>
    <div class="legend-item"><div class="ldot" style="background:#c0392b"></div> 1–3</div>
    <div class="legend-item"><div class="ldot" style="background:#d68910"></div> 4–6</div>
    <div class="legend-item"><div class="ldot" style="background:#1a5276"></div> 7–9</div>
    <div class="legend-item"><div class="ldot" style="background:#1e5a2a"></div> 10–12</div>
  </div>

  <div id="tableContainer"></div>
  <div class="refresh-hint">Дані оновлюються автоматично кожні 30 секунд</div>
</div>

<script>
const GRADE_SCALE=[[90,12],[83,11],[75,10],[67,9],[59,8],[50,7],[42,6],[34,5],[26,4],[17,3],[8,2],[0,1]];
function pctToGrade(p){for(const[min,g]of GRADE_SCALE)if(p>=min)return g;return 1;}
function gradeStyle(g){if(g===null)return 'g-none';if(g>=10)return 'g-high';if(g>=7)return 'g-good';if(g>=4)return 'g-mid';return 'g-low';}
function todayStr(){return new Date().toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});}

let db={}, currentClass='';

function loadData(){
  try{
    const raw=localStorage.getItem('boardTracker_v2');
    if(raw){const d=JSON.parse(raw);db=d.db||{};currentClass=d.currentClass||'';}
  }catch(e){}
  if(!Object.keys(db).length)return false;
  if(!currentClass||!db[currentClass])currentClass=Object.keys(db)[0];
  return true;
}

function renderTabs(){
  const tabs=document.getElementById('classTabs');
  tabs.innerHTML=Object.keys(db).map(c=>
    `<button class="class-tab${c===currentClass?' active':''}" onclick="switchClass('${c}')">${c}</button>`
  ).join('');
}

function switchClass(c){currentClass=c;renderTabs();renderTable();renderStats();}

function renderStats(){
  const students=db[currentClass].students;
  const active=students.filter(s=>s.status!=='absent');
  const graded=active.filter(s=>s.visits.some(v=>v!==null));
  const grades=graded.map(s=>{const f=s.visits.filter(v=>v!==null);return pctToGrade(Math.round(f.reduce((a,b)=>a+b,0)/f.length));});
  const avgGrade=grades.length?(grades.reduce((a,b)=>a+b,0)/grades.length).toFixed(1):'—';
  const quality=grades.length?Math.round(grades.filter(g=>g>=7).length/grades.length*100)+'%':'—';
  const neverOut=active.filter(s=>s.visits.every(v=>v===null)&&s.status!=='notready').length;
  document.getElementById('st-total').textContent=students.length;
  document.getElementById('st-graded').textContent=graded.length;
  document.getElementById('st-avg').textContent=avgGrade;
  document.getElementById('st-quality').textContent=quality;
  document.getElementById('st-never').textContent=neverOut;
}

function renderTable(){
  const container=document.getElementById('tableContainer');
  const students=db[currentClass].students;
  if(!students.length){
    container.innerHTML=`<div class="no-data"><div class="no-data-title">Список порожній</div><div class="no-data-sub">Учні ще не додані</div></div>`;
    return;
  }
  const rows=students.map((s,idx)=>{
    const filled=s.visits.filter(v=>v!==null);
    const avg=filled.length?Math.round(filled.reduce((a,b)=>a+b,0)/filled.length):null;
    const grade=avg!==null?pctToGrade(avg):null;
    const gc=gradeStyle(grade);
    const absent=s.status==='absent',notready=s.status==='notready';

    const visitCols=[0,1,2,3].map(i=>{
      if(s.visits[i]===null) return `<td class="visit-cell"><span class="empty-visit">—</span></td>`;
      const date=s.visitDates&&s.visitDates[i]?new Date(s.visitDates[i]).toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit'}):'';
      return `<td class="visit-cell">
        <span class="visit-pct filled">${s.visits[i]}%</span>
        ${date?`<span class="visit-date-sm">${date}</span>`:''}
      </td>`;
    }).join('');

    const statusPill=absent?`<div><span class="status-pill pill-absent">відсутній</span></div>`:
      notready?`<div><span class="status-pill pill-notready">не готовий</span></div>`:'';
    const commentIcon=s.comment?`<span class="comment-icon" title="${s.comment}">💬</span>`:'';

    return `<tr>
      <td class="num-cell">${idx+1}</td>
      <td>
        <div class="name-cell${absent?' name-missing':''}">${s.name}</div>
        ${statusPill}
      </td>
      ${visitCols}
      <td class="avg-cell">${avg!==null?avg+'%':'—'}</td>
      <td><span class="grade-badge ${gc}">${grade!==null?grade:'—'}</span></td>
      <td>${commentIcon}</td>
    </tr>`;
  }).join('');

  container.innerHTML=`
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Учень</th>
            <th style="text-align:center">Вихід 1</th>
            <th style="text-align:center">Вихід 2</th>
            <th style="text-align:center">Вихід 3</th>
            <th style="text-align:center">Вихід 4</th>
            <th style="text-align:right">Сер.%</th>
            <th>Оцінка</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function refresh(){
  loadData();renderTabs();renderTable();renderStats();
}

document.getElementById('todayDate').textContent=todayStr();

if(!loadData()){
  document.getElementById('tableContainer').innerHTML=`
    <div class="no-data">
      <div class="no-data-title">Даних ще немає</div>
      <div class="no-data-sub">Відкрийте <a href="edit.html" style="color:var(--accent)">сторінку редагування</a> і введіть дані</div>
    </div>`;
} else {
  renderTabs();renderTable();renderStats();
}

// Auto-refresh every 30s
setInterval(refresh, 30000);
</script>
</body>
</html>

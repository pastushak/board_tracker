<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>board-tracker / панель</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f11;--bg2:#141618;--bg3:#1a1d21;
  --border:#2a2f35;--border2:#363c44;
  --text:#e8eaed;--text2:#8b949e;--text3:#484f58;
  --accent:#d97706;--accent-dim:#92400e;--accent-light:rgba(217,119,6,.12);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--yellow:#eab308;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--r:6px;
}
[data-theme="light"]{
  --bg:#f8f7f4;--bg2:#fff;--bg3:#f1f0ec;
  --border:#e0ddd6;--border2:#ccc9c0;
  --text:#1a1916;--text2:#6b6960;--text3:#aaa89f;
  --accent:#b45309;--accent-dim:#d97706;--accent-light:rgba(180,83,9,.1);
  --green:#15803d;--red:#b91c1c;--blue:#1d4ed8;--yellow:#92400e;
}
[data-theme="mix"]{
  --bg:#0d0f11;--bg2:#fff;--bg3:#f1f0ec;
  --border:#e0ddd6;--border2:#ccc9c0;
  --text:#1a1916;--text2:#6b6960;--text3:#aaa89f;
  --accent:#d97706;--accent-dim:#92400e;--accent-light:rgba(217,119,6,.12);
  --green:#15803d;--red:#b91c1c;--blue:#1d4ed8;--yellow:#92400e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.brand{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700;letter-spacing:.02em;}
.sep{color:var(--border2);}
.top-class{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:600;}
.mode-pill{font-family:var(--mono);font-size:10px;background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.3);border-radius:20px;padding:2px 10px;}
.top-time{font-family:var(--mono);font-size:13px;color:var(--text2);margin-left:auto;}
.top-date{font-family:var(--mono);font-size:11px;color:var(--text3);}
.edit-link{font-family:var(--mono);font-size:11px;color:var(--accent);text-decoration:none;border:1px solid var(--accent-dim);border-radius:var(--r);padding:4px 10px;background:var(--accent-light);}
.edit-link:hover{opacity:.8;}
.theme-toggle{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:2px;}
.tt-btn{font-family:var(--mono);font-size:10px;padding:3px 8px;border:none;border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
.tt-btn.on{background:var(--accent);color:#000;font-weight:600;}
.tt-btn:not(.on):hover{color:var(--text2);}

/* STATS STRIP */
.stats-strip{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);overflow-x:auto;}
.scard{flex:1;min-width:90px;padding:12px 16px;background:var(--bg2);}
.scard-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.scard-val{font-family:var(--mono);font-size:22px;font-weight:700;}

/* CLASS TABS */
.tabs{display:flex;gap:6px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.tab{font-family:var(--mono);font-size:12px;padding:5px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.tab:hover{border-color:var(--border2);color:var(--text);}
.tab.on{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600;}

/* CONTENT */
.content{padding:20px;}

/* COUNTDOWN BAR */
.countdown-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);}
.cd-label{font-family:var(--mono);font-size:11px;color:var(--text3);}
.cd-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.cd-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .9s linear;}
.cd-val{font-family:var(--mono);font-size:12px;color:var(--text2);min-width:28px;text-align:right;}
.cd-status{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:10px;}
.cd-status.ok{background:rgba(34,197,94,.12);color:var(--green);}
.cd-status.loading{background:rgba(234,179,8,.12);color:var(--yellow);}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:500px;}
thead{background:var(--bg3);}
th{padding:10px 12px;font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,.02);}
.nc{width:32px;font-family:var(--mono);font-size:12px;color:var(--text3);}

/* NAME */
.name-main{font-size:14px;font-weight:500;}
.name-absent{color:var(--text3);text-decoration:line-through;}
.spill{display:inline-block;font-family:var(--mono);font-size:9px;padding:1px 7px;border-radius:4px;margin-top:3px;}
.spill-ab{background:rgba(234,179,8,.1);color:var(--yellow);}
.spill-nr{background:rgba(239,68,68,.1);color:var(--red);}

/* VISIT */
.vcell{text-align:center;min-width:64px;}
.vpct{display:inline-block;font-family:var(--mono);font-size:13px;font-weight:600;padding:3px 9px;border-radius:var(--r);background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.vdt{font-family:var(--mono);font-size:9px;color:var(--text3);display:block;margin-top:2px;}
.vempty{font-family:var(--mono);font-size:13px;color:var(--text3);}

.avg-td{font-family:var(--mono);font-size:13px;color:var(--text2);text-align:right;white-space:nowrap;font-weight:500;}

/* GRADE BADGE — bigger for classroom visibility */
.gb{display:inline-flex;align-items:center;justify-content:center;width:38px;height:32px;border-radius:var(--r);font-family:var(--mono);font-size:16px;font-weight:700;}
.gh{background:rgba(34,197,94,.15);color:var(--green);}
.gg{background:rgba(59,130,246,.15);color:var(--blue);}
.gm{background:rgba(234,179,8,.15);color:var(--yellow);}
.gl{background:rgba(239,68,68,.15);color:var(--red);}
.gn{background:var(--bg3);color:var(--text3);}

.no-data{text-align:center;padding:60px 16px;color:var(--text3);}
.no-data-title{font-family:var(--mono);font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text2);}
.no-data-sub{font-family:var(--mono);font-size:12px;}
.no-data a{color:var(--accent);text-decoration:none;}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:14px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-family:var(--mono);font-size:13px;color:var(--text3);}

/* LEGEND */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
.li{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--text3);}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

@media(max-width:600px){
  .topbar{height:auto;padding:8px 12px;}
  .top-date{display:none;}
  .content{padding:12px;}
  .gb{width:32px;height:28px;font-size:14px;}
  th,td{padding:6px 8px;}
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-txt">// підключення до Supabase...</div>
</div>

<div id="mainView" style="display:none">
  <div class="topbar">
    <span class="brand">board-tracker</span>
    <span class="sep">/</span>
    <span class="top-class" id="topClass">—</span>
    <span class="mode-pill">панель</span>
    <span class="top-time" id="topTime"></span>
    <span class="top-date" id="topDate"></span>
    <a href="edit.html" class="edit-link">edit →</a>
    <div class="theme-toggle">
      <button class="tt-btn on" id="tt-dark"  onclick="setTheme('dark')">dark</button>
      <button class="tt-btn"    id="tt-light" onclick="setTheme('light')">light</button>
      <button class="tt-btn"    id="tt-mix"   onclick="setTheme('mix')">mix</button>
    </div>
  </div>

  <div class="stats-strip">
    <div class="scard"><div class="scard-label">Учнів</div><div class="scard-val" id="st-total">—</div></div>
    <div class="scard"><div class="scard-label">Оцінено</div><div class="scard-val" id="st-graded">—</div></div>
    <div class="scard"><div class="scard-label">Сер. оцінка</div><div class="scard-val" id="st-avg">—</div></div>
    <div class="scard"><div class="scard-label">Якість ≥7</div><div class="scard-val" id="st-quality">—</div></div>
    <div class="scard"><div class="scard-label">Не виходили</div><div class="scard-val" id="st-never">—</div></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="content">
    <div class="countdown-bar">
      <span class="cd-label">наступне оновлення</span>
      <div class="cd-track"><div class="cd-fill" id="cdFill" style="width:100%"></div></div>
      <span class="cd-val" id="cdVal">15с</span>
      <span class="cd-status ok" id="cdStatus">● online</span>
    </div>

    <div class="legend">
      <div class="li"><div class="ld" style="background:var(--green)"></div> є результат</div>
      <div class="li"><div class="ld" style="background:var(--red)"></div> 1–3</div>
      <div class="li"><div class="ld" style="background:var(--yellow)"></div> 4–6</div>
      <div class="li"><div class="ld" style="background:var(--blue)"></div> 7–9</div>
      <div class="li"><div class="ld" style="background:var(--green)"></div> 10–12</div>
    </div>

    <div id="tblContainer"></div>
  </div>
</div>

<script src="config.js"></script>
<script>
const SB_URL = CONFIG.SB_URL;
const SB_KEY = CONFIG.SB_KEY;
const THEME_KEY = 'boardTracker_theme';
const REFRESH_SEC = 15;

const GS=[[90,12],[83,11],[75,10],[67,9],[59,8],[50,7],[42,6],[34,5],[26,4],[17,3],[8,2],[0,1]];
const p2g=p=>{for(const[m,g]of GS)if(p>=m)return g;return 1;};
const gCls=g=>{if(g===null)return'gn';if(g>=10)return'gh';if(g>=7)return'gg';if(g>=4)return'gm';return'gl';};
const todayStr=()=>new Date().toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});

let classes={}, cc='';
let cdSec=REFRESH_SEC, cdInterval=null;

// ── SUPABASE ──────────────────────────────────────────
async function fetchData(){
  const res=await fetch(SB_URL+'/rest/v1/classes?select=*',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

async function refresh(){
  const status=document.getElementById('cdStatus');
  try{
    status.className='cd-status loading';
    status.textContent='○ оновлення...';
    const rows=await fetchData();
    classes={};
    rows.forEach(r=>{classes[r.id]={students:r.students||[],lessonCount:r.lesson_count||1};});
    if(!cc||!classes[cc])cc=Object.keys(classes)[0]||'';
    document.getElementById('topClass').textContent=cc;
    renderTabs();renderStats();renderTable();
    status.className='cd-status ok';
    status.textContent='● online';
  }catch(e){
    console.error(e);
    status.className='cd-status loading';
    status.textContent='✕ помилка';
  }
}

// ── COUNTDOWN ─────────────────────────────────────────
function startCountdown(){
  cdSec=REFRESH_SEC;
  if(cdInterval)clearInterval(cdInterval);
  cdInterval=setInterval(async()=>{
    cdSec--;
    const pct=Math.round(cdSec/REFRESH_SEC*100);
    document.getElementById('cdFill').style.width=pct+'%';
    document.getElementById('cdVal').textContent=cdSec+'с';
    if(cdSec<=0){
      cdSec=REFRESH_SEC;
      document.getElementById('cdFill').style.width='100%';
      await refresh();
    }
  },1000);
}

// ── CLOCK ─────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  document.getElementById('topTime').textContent=
    now.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── RENDER ────────────────────────────────────────────
function switchClass(c){
  cc=c;
  document.getElementById('topClass').textContent=cc;
  renderTabs();renderStats();renderTable();
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=Object.keys(classes).map(c=>
    `<button class="tab${c===cc?' on':''}" onclick="switchClass('${c}')">${c}</button>`
  ).join('');
}

function renderStats(){
  const sts=classes[cc]?.students||[];
  const act=sts.filter(s=>s.status!=='absent');
  const gr=act.filter(s=>s.visits.some(v=>v!==null));
  const gs=gr.map(s=>{const f=s.visits.filter(v=>v!==null);return p2g(Math.round(f.reduce((a,b)=>a+b,0)/f.length));});
  const avg=gs.length?(gs.reduce((a,b)=>a+b,0)/gs.length).toFixed(1):'—';
  const qual=gs.length?Math.round(gs.filter(g=>g>=7).length/gs.length*100)+'%':'—';
  const nev=act.filter(s=>s.visits.every(v=>v===null)&&s.status!=='notready').length;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('st-total',sts.length);set('st-graded',gr.length);set('st-avg',avg);set('st-quality',qual);set('st-never',nev);
}

function renderTable(){
  const c=document.getElementById('tblContainer');
  const sts=classes[cc]?.students||[];
  if(!sts.length){
    c.innerHTML=`<div class="no-data">
      <div class="no-data-title">// даних ще немає</div>
      <div class="no-data-sub">відкрийте <a href="edit.html">edit.html</a> і введіть дані</div>
    </div>`;return;
  }
  const rows=sts.map((s,i)=>{
    const f=s.visits.filter(v=>v!==null);
    const avg=f.length?Math.round(f.reduce((a,b)=>a+b,0)/f.length):null;
    const g=avg!==null?p2g(avg):null;
    const ab=s.status==='absent',nr=s.status==='notready';
    const vCols=[0,1,2,3].map(vi=>{
      if(s.visits[vi]===null)return`<td class="vcell"><span class="vempty">—</span></td>`;
      const dt=s.visitDates?.[vi]?new Date(s.visitDates[vi]).toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit'}):'';
      return`<td class="vcell"><span class="vpct">${s.visits[vi]}%</span>${dt?`<span class="vdt">${dt}</span>`:''}</td>`;
    }).join('');
    const spill=ab?`<div><span class="spill spill-ab">відсутній</span></div>`:
      nr?`<div><span class="spill spill-nr">не готовий</span></div>`:'';
    const cmnt=s.comment?`<span title="${s.comment}" style="cursor:default">💬</span>`:'';
    return`<tr>
      <td class="nc">${i+1}</td>
      <td><div class="name-main${ab?' name-absent':''}">${s.name}</div>${spill}</td>
      ${vCols}
      <td class="avg-td">${avg!==null?avg+'%':'—'}</td>
      <td><span class="gb ${gCls(g)}">${g!==null?g:'—'}</span></td>
      <td>${cmnt}</td>
    </tr>`;
  }).join('');
  c.innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr>
      <th>#</th><th>Учень</th>
      <th style="text-align:center">Вихід 1</th>
      <th style="text-align:center">Вихід 2</th>
      <th style="text-align:center">Вихід 3</th>
      <th style="text-align:center">Вихід 4</th>
      <th style="text-align:right">Сер.%</th>
      <th>Оцінка</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function setTheme(t){
  document.documentElement.setAttribute('data-theme',t==='dark'?'':t);
  localStorage.setItem(THEME_KEY,t);
  ['dark','light','mix'].forEach(k=>document.getElementById('tt-'+k)?.classList.toggle('on',k===t));
}
(()=>{const t=localStorage.getItem(THEME_KEY)||'dark';setTheme(t);})();

// ── BOOT ──────────────────────────────────────────────
document.getElementById('topDate').textContent=todayStr();
setInterval(updateClock,1000);
updateClock();

(async()=>{
  await refresh();
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('mainView').style.display='block';
  startCountdown();
})();
</script>
</body>
</html>
